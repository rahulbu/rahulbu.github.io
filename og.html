<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><style>
  html,body{margin:0;padding:0;}
  .og{position:relative; width:1200px; height:630px; overflow:hidden; color:#e9eff8;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:radial-gradient(700px 420px at 82% 22%, rgba(59,130,246,.28), transparent 60%),
      linear-gradient(120deg,#0a0f1c 0%,#0e1830 58%,#12203c 100%);}
  .content{position:absolute; left:80px; top:0; height:630px; display:flex; flex-direction:column; justify-content:center; max-width:640px;}
  .eyebrow{color:#5b9dff; font-weight:700; letter-spacing:.12em; text-transform:uppercase; font-size:20px; margin-bottom:18px;}
  .name{font-size:40px; font-weight:800; margin-bottom:10px;}
  h1{font-size:66px; line-height:1.05; font-weight:800; margin:0 0 18px; letter-spacing:-1.5px;}
  h1 .a{background:linear-gradient(90deg,#5b9dff,#a78bfa); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;}
  .sub{font-size:28px; color:#cdddf5; font-weight:600; margin-bottom:26px;}
  .tech{font-size:18px; color:#8ba0c2; letter-spacing:.4px;}
  .url{position:absolute; left:80px; bottom:46px; color:#5b9dff; font-size:20px; font-weight:600;}
  .photo{position:absolute; right:90px; top:205px; width:220px; height:220px; border-radius:50%; object-fit:cover;
    border:4px solid rgba(91,157,255,.6); box-shadow:0 0 0 10px rgba(59,130,246,.12);}
  svg.grid{position:absolute; inset:0; width:100%; height:100%; opacity:.45;}
</style></head><body>
  <div class="og">
    <svg class="grid" viewBox="0 0 1200 630"><g stroke="#3b82f6" stroke-width="1.4" opacity="0.6">
      <line x1="140" y1="120" x2="360" y2="220"/><line x1="360" y1="220" x2="300" y2="440"/><line x1="360" y1="220" x2="640" y2="160"/>
      <line x1="640" y1="160" x2="900" y2="300"/><line x1="900" y1="300" x2="1080" y2="180"/><line x1="900" y1="300" x2="980" y2="500"/></g>
      <g fill="#5b9dff"><circle cx="140" cy="120" r="6"/><circle cx="360" cy="220" r="9"/><circle cx="300" cy="440" r="6"/>
      <circle cx="640" cy="160" r="7"/><circle cx="900" cy="300" r="8"/><circle cx="1080" cy="180" r="6"/><circle cx="980" cy="500" r="6"/></g></svg>
    <div class="content">
      <div class="eyebrow">Senior Software Engineer @ Tellius</div>
      <div class="name">Rahul B U</div>
      <h1>Building <span class="a">Gen AI</span> that ships.</h1>
      <div class="sub">Backend &amp; Search &nbsp;→&nbsp; Applied AI</div>
      <div class="tech">LangGraph · Text-to-SQL · Elasticsearch · Multi-agent Systems · Distributed Systems</div>
    </div>
    <img class="photo" src="me.jpg" alt="">
    <div class="url">rahulbu.github.io</div>
  </div>
</body></html>
